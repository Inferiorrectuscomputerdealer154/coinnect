<svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
  <!-- Proposal 1: Wise-style — Two overlapping circles forming a routing node -->
  <!-- Concept: Two open circles overlap in the center, connected by a clean path -->
  <!-- The overlap creates a natural "link" or "handshake" shape -->

  <!-- Left circle (source) -->
  <circle cx="16" cy="22" r="11" fill="none" stroke="#06b6d4" stroke-width="2.5"/>

  <!-- Right circle (destination) -->
  <circle cx="28" cy="22" r="11" fill="none" stroke="#06b6d4" stroke-width="2.5"/>

  <!-- Routing arrow through center — a forward path -->
  <path d="M8 22 L36 22" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 18 L36 22 L32 26" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small dot at origin -->
  <circle cx="8" cy="22" r="2" fill="#06b6d4"/>
</svg>
