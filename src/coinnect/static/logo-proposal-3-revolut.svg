<svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
  <!-- Proposal 3: Revolut-style — Geometric coin with routing paths inside -->
  <!-- Concept: A circle (coin) with three internal paths showing route comparison -->
  <!-- Minimal, works dark-first, monochrome-friendly -->

  <!-- Outer coin ring -->
  <circle cx="22" cy="22" r="20" fill="none" stroke="#06b6d4" stroke-width="2"/>

  <!-- Inner fill — subtle -->
  <circle cx="22" cy="22" r="20" fill="#06b6d4" opacity="0.08"/>

  <!-- Three routing paths from left to right, different curves = different routes -->

  <!-- Fast/direct route (top) -->
  <path d="M10 17 L34 17"
        fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>

  <!-- Medium route (middle, slight curve) -->
  <path d="M10 22 Q22 18, 34 22"
        fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>

  <!-- Longer route (bottom, more curve) -->
  <path d="M10 27 Q16 27, 19 31 Q22 35, 25 31 Q28 27, 34 27"
        fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>

  <!-- Arrowheads at right end -->
  <path d="M31 14 L34 17 L31 20" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M31 19 L34 22 L31 25" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M31 24 L34 27 L31 30" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
